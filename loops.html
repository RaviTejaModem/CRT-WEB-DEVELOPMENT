<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loop Iteration Program</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#cfe2ff,#e8f0ff);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
}

h1{
margin-bottom:20px;
}

.container{
display:flex;
gap:20px;
}

.box{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
width:260px;
text-align:center;
}

input{
width:90%;
padding:8px;
margin:8px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
padding:8px 16px;
border:none;
background:#28a745;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#218838;
}

.result{
margin-top:15px;
font-weight:bold;
}

</style>
</head>

<body>

<h1>Loop Iteration Program</h1>

<div class="container">

<!-- FOR LOOP -->
<div class="box">

<h3>For Loop</h3>

<input type="number" id="forIter" placeholder="No. of Iterations">

<input type="text" id="forValue" placeholder="Enter Number / Alphabet">

<button onclick="runFor()">Run</button>

<div class="result" id="forOutput"></div>

</div>


<!-- WHILE LOOP -->
<div class="box">

<h3>While Loop</h3>

<input type="number" id="whileIter" placeholder="No. of Iterations">

<input type="text" id="whileValue" placeholder="Enter Number / Alphabet">

<button onclick="runWhile()">Run</button>

<div class="result" id="whileOutput"></div>

</div>


<!-- DO WHILE LOOP -->
<div class="box">

<h3>Do While Loop</h3>

<input type="number" id="doIter" placeholder="No. of Iterations">

<input type="text" id="doValue" placeholder="Enter Number / Alphabet">

<button onclick="runDoWhile()">Run</button>

<div class="result" id="doOutput"></div>

</div>

</div>


<script>

function runFor(){

let n = document.getElementById("forIter").value
let value = document.getElementById("forValue").value
let output=""

for(let i=1;i<=n;i++){
output += value + " "
}

document.getElementById("forOutput").innerHTML = output

}



function runWhile(){

let n = document.getElementById("whileIter").value
let value = document.getElementById("whileValue").value
let output=""
let i=1

while(i<=n){

output += value + " "
i++

}

document.getElementById("whileOutput").innerHTML = output

}



function runDoWhile(){

let n = document.getElementById("doIter").value
let value = document.getElementById("doValue").value
let output=""
let i=1

do{

output += value + " "
i++

}

while(i<=n)

document.getElementById("doOutput").innerHTML = output

}

</script>

</body>
</html>
