<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade Calculator</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#cfe2ff,#e8f0ff);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
width:350px;
text-align:center;
}

h1{
margin-bottom:15px;
}

input{
width:90%;
padding:10px;
margin:6px 0;
border-radius:5px;
border:1px solid #ccc;
font-size:16px;
}

button{
margin-top:10px;
padding:10px 18px;
border:none;
background:#28a745;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
margin-right:5px;
}

button:hover{
background:#218838;
}

.reset{
background:#dc3545;
}

.reset:hover{
background:#b52a37;
}

.result{
margin-top:20px;
font-size:18px;
font-weight:bold;
}

.pass{
color:green;
}

.fail{
color:red;
}

</style>
</head>

<body>

<div class="container">

<h1>Grade Calculator</h1>

<input type="number" id="hw" placeholder="Homework Marks (0-100)">
<input type="number" id="quiz" placeholder="Quiz Marks (0-100)">
<input type="number" id="project" placeholder="Project Marks (0-100)">
<input type="number" id="midterm" placeholder="Midterm Marks (0-100)">
<input type="number" id="final" placeholder="Final Exam Marks (0-100)">

<button onclick="calculate()">Calculate</button>
<button class="reset" onclick="resetFields()">Reset</button>

<div class="result" id="output"></div>

</div>

<script>

function calculate(){

let hw = Number(document.getElementById("hw").value);
let quiz = Number(document.getElementById("quiz").value);
let project = Number(document.getElementById("project").value);
let midterm = Number(document.getElementById("midterm").value);
let final = Number(document.getElementById("final").value);

if(hw>100 || quiz>100 || project>100 || midterm>100 || final>100){
alert("Marks cannot be greater than 100");
return;
}

let total = hw + quiz + project + midterm + final;

let average = total / 5;

let percentage = (total / 500) * 100;

let grade;

if(percentage >= 90){
grade = "A+";
}
else if(percentage >= 80){
grade = "A";
}
else if(percentage >= 70){
grade = "B";
}
else if(percentage >= 60){
grade = "C";
}
else if(percentage >= 50){
grade = "D";
}
else{
grade = "F";
}

let result;
let color;

if(percentage >= 50){
result = "PASS";
color = "pass";
}
else{
result = "FAIL";
color = "fail";
}

document.getElementById("output").innerHTML =
`
Total Marks: ${total} / 500 <br>
Average: ${average.toFixed(2)} <br>
Percentage: ${percentage.toFixed(2)}% <br>
Grade: ${grade} <br>
Final Result: <span class="${color}">${result}</span>
`;

}

function resetFields(){

document.getElementById("hw").value="";
document.getElementById("quiz").value="";
document.getElementById("project").value="";
document.getElementById("midterm").value="";
document.getElementById("final").value="";
document.getElementById("output").innerHTML="";

}

</script>

</body>
</html>
