<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile Card</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

/* page background */

body{
height:100vh;
background:#6b6ed6;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
position:relative;
}

/* particle container */

#particles{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:0;
}

/* glowing dots */

.particle{
position:absolute;
background:white;
border-radius:50%;
filter:blur(3px);
opacity:0.8;
animation:fall linear infinite;
}

/* falling animation */

@keyframes fall{
from{
transform:translateY(-100px);
}
to{
transform:translateY(110vh);
}
}

/* profile card */

.card{
width:320px;
background:#2d2c64;
border-radius:18px;
overflow:hidden;
box-shadow:0 12px 30px rgba(0,0,0,0.3);
text-align:center;
color:white;
position:relative;
z-index:1;
}

/* top area */

.top{
background:#e6e6f0;
height:140px;
position:relative;
}

/* profile image */

.profile-img{
position:absolute;
bottom:-55px;
left:50%;
transform:translateX(-50%);
border-radius:50%;
padding:6px;
background:#2d2c64;
}

.profile-img img{
width:110px;
height:110px;
border-radius:50%;
}

/* content */

.content{
padding-top:70px;
padding-bottom:20px;
}

.name{
font-size:20px;
font-weight:bold;
margin-bottom:10px;
}

.location{
font-size:14px;
opacity:0.8;
margin-bottom:5px;
}

.desc{
font-size:14px;
opacity:0.8;
margin-bottom:20px;
}

/* buttons */

.buttons{
display:flex;
justify-content:center;
gap:15px;
margin-bottom:20px;
}

button{
padding:10px 18px;
border:none;
border-radius:8px;
background:#1e1d52;
color:rgb(83, 107, 218);
cursor:pointer;
box-shadow:0 5px 10px rgba(0,0,0,0.3);
transition:0.3s;
}

button:hover{
background:#97a9d8;
}

/* divider */

hr{
border:none;
border-top:1px solid rgba(255,255,255,0.2);
margin:10px 30px;
}

/* skills */

.skills-title{
font-weight:bold;
margin-top:10px;
}

.skills{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:15px 25px 25px;
font-size:13px;
}

</style>
</head>

<body>

<!-- glowing background -->
<div id="particles"></div>

<!-- profile card -->
<div class="card">

<div class="top">

<div class="profile-img">
<img src="https://media.licdn.com/dms/image/v2/D4E03AQFxg77imx19VA/profile-displayphoto-shrink_200_200/B4EZSEChVtGYAY-/0/1737382050299?e=2147483647&v=beta&t=dGpo8_cMEaX_5vZjAAkUiApMP5dM-9ECb7-dyNt850g">
</div>

</div>

<div class="content">

<div class="name">Ravi Teja</div>

<div class="location">📍KUWAIT</div>

<div class="desc">UI/UX designer and front-end developer</div>

<div class="buttons">
<button>Message</button>
<button>Follow</button>
</div>

<hr>

<div class="skills-title">SKILLS</div>

<div class="skills">
<div>UI/UX</div>
<div>Front End Development</div>
<div>HTML</div>
<div>CSS</div>
<div>Javascript</div>
<div>React</div>
<div>Bootstrap</div>
</div>

</div>

</div>

<script>

/* create random glowing particles */

const container = document.getElementById("particles");

for(let i=0;i<40;i++){

let dot = document.createElement("div");
dot.classList.add("particle");

let size = Math.random()*6 + 2;
dot.style.width = size+"px";
dot.style.height = size+"px";

dot.style.left = Math.random()*100+"vw";

dot.style.animationDuration = (Math.random()*5+5)+"s";

dot.style.animationDelay = Math.random()*5+"s";

container.appendChild(dot);

}

</script>

</body>
</html>
