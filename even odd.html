<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Even Odd Checker</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#cfe2ff,#e8f0ff);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
width:320px;
text-align:center;
}

h1{
margin-bottom:20px;
}

input{
width:90%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
font-size:16px;
}

button{
padding:10px 18px;
border:none;
background:#28a745;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
margin:5px;
}

button:hover{
background:#218838;
}

.reset{
background:#dc3545;
}

.reset:hover{
background:#b52a37;
}

.result{
margin-top:20px;
font-size:20px;
font-weight:bold;
}

.even{
color:green;
}

.odd{
color:red;
}

</style>
</head>

<body>

<div class="container">

<h1>Even Odd Checker</h1>

<input type="number" id="number" placeholder="Enter a number">

<br>

<button onclick="checkNumber()">Check</button>
<button class="reset" onclick="resetFields()">Reset</button>

<div class="result" id="output"></div>

</div>

<script>

function checkNumber(){

let num = document.getElementById("number").value;

if(num != ""){

    if(num % 2 == 0){
        document.getElementById("output").innerHTML =
        `<span class="even">The number ${num} is EVEN</span>`;
    }

    else{
        document.getElementById("output").innerHTML =
        `<span class="odd">The number ${num} is ODD</span>`;
    }

}

else{
alert("Please enter a number");
}

}

function resetFields(){

document.getElementById("number").value="";
document.getElementById("output").innerHTML="";

}

</script>

</body>
</html>
